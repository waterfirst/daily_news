name: ETF Analysis Service

on:
  schedule:
    # Run at 09:00, 10:00, 11:00, 12:00, 13:00, 14:00, 15:00 KST (UTC+9)
    # Convert to UTC: subtract 9 hours
    - cron: '0 0,1,2,3,4,5,6 * * 1-5'  # 09:00-15:00 KST on weekdays
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-etf-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STOCK_API_KEY: ${{ secrets.STOCK_API_KEY }}
        run: |
          python main.py etf

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
