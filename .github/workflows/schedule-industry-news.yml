name: Industry News Services

on:
  schedule:
    # Beauty news: 11:00, 15:00 KST
    # Display news: 10:00, 14:00 KST
    # Semiconductor news: 09:00, 13:00 KST
    # Combined schedule at 09:00, 10:00, 11:00, 13:00, 14:00, 15:00 KST
    - cron: '0 0,1,2,4,5,6 * * *'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to run (beauty, display, semiconductor, all)'
        required: false
        default: 'all'

jobs:
  run-beauty-news:
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'beauty' || github.event.inputs.service == 'all' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run beauty news scraping
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py beauty

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beauty-news-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  run-display-news:
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'display' || github.event.inputs.service == 'all' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run display news scraping
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py display

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: display-news-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  run-semiconductor-news:
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'semiconductor' || github.event.inputs.service == 'all' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run semiconductor news scraping
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py semiconductor

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semiconductor-news-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
